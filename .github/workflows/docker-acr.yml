name: Build & Push to Aliyun ACR (custom)

on:
  workflow_dispatch: {}
  push:
    branches: [custom]
    paths-ignore:
      - 'custom/docs/**'
      - '**/*.md'

env:
  ACR_REGISTRY: crpi-msjfhehj888m1yl4.ap-northeast-1.personal.cr.aliyuncs.com
  ACR_NAMESPACE: x2api
  IMAGE_NAME: new-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Write VERSION
        run: echo "custom-$(git rev-parse --short HEAD)" > VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 第一步就登录 ACR——凭据错会立刻失败，便于快速验证 secret 是否正确
      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:custom
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# trigger build
